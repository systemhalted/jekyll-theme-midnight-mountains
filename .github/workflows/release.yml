name: Release gem

on:
  release:
    types: [published]

jobs:
  push:
    name: Push gem to RubyGems.org
    runs-on: ubuntu-latest

    environment: release

    # Opt the action's bundled JS sub-actions into Node.js 24 ahead of the
    # June 2, 2026 forced cutover (silences the Node 20 deprecation warning).
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    permissions:
      contents: read    # tag already exists (created by the Release); no push needed
      id-token: write   # OIDC token for Trusted Publishing

    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - uses: rubygems/release-gem@v1
